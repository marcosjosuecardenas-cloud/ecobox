<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EcoBox Perú</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#0a7d3b;color:#fff;padding:15px;text-align:center}
.hero{background:linear-gradient(120deg,#0a7d3b,#4caf50);color:#fff;padding:60px;text-align:center}
.hero h1{font-size:40px;margin:0}
.hero p{font-size:18px;margin:10px 0}
button{padding:10px 15px;border:none;background:#0a7d3b;color:#fff;cursor:pointer;border-radius:5px}
.section{padding:30px;text-align:center}
.card{background:#fff;padding:20px;margin:10px;border-radius:10px;display:inline-block;width:250px}
.hidden{display:none}
input{padding:8px;margin:5px;width:220px}
</style>
</head>

<body>

<header>
<h2>EcoBox Perú 🌱</h2>
</header>

<!-- LANDING -->
<section id="landing">

<div class="hero">
<h1>Recibe productos ecológicos en casa</h1>
<p>Suscríbete y cuida el planeta 🌍</p>
<button onclick="show('login')">Iniciar sesión</button>
<button onclick="show('registro')">Registrarse</button>
</div>

<div class="section">
<h2>¿Por qué EcoBox?</h2>
<div class="card">♻️ Productos sostenibles</div>
<div class="card">🚚 Entrega rápida</div>
<div class="card">💚 Apoyas al medio ambiente</div>
</div>

<div class="section">
<h2>Planes</h2>

<div class="card">
<h3>Básico</h3>
<p>S/49.9</p>
<button onclick="show('login')">Comprar</button>
</div>

<div class="card">
<h3>Premium</h3>
<p>S/79.9</p>
<button onclick="show('login')">Comprar</button>
</div>

</div>

</section>

<!-- LOGIN -->
<section id="login" class="hidden">
<h3>Login</h3>
<input id="user" placeholder="Usuario"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Ingresar</button>
<button onclick="show('landing')">Volver</button>
</section>

<!-- REGISTRO -->
<section id="registro" class="hidden">
<h3>Registro</h3>
<input id="ruser" placeholder="Usuario"><br>
<input id="rpass" type="password" placeholder="Contraseña"><br>
<input id="rnombre" placeholder="Nombre"><br>
<button onclick="registrar()">Registrar</button>
<button onclick="show('landing')">Volver</button>
</section>

<!-- PLANES -->
<section id="planes" class="hidden">
<h3>Planes</h3>

<div class="card">
Básico S/49.9
<button onclick="pagar('Básico',49.9)">Comprar</button>
</div>

<div class="card">
Premium S/79.9
<button onclick="pagar('Premium',79.9)">Comprar</button>
</div>

<button onclick="logout()">Cerrar sesión</button>
</section>

<script>
const API = 'http://127.0.0.1:3000';
let token = null;
let currentUser = null;

function show(id){
 document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
}

// LOGIN
async function login(){
 const res = await fetch(API+'/login',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({user:user.value, pass:pass.value})
 });

 if(res.status!==200){alert('Error login'); return;}

 const data = await res.json();
 token = data.token;
 currentUser = data.user;

 show('planes');
}

// REGISTRO
async function registrar(){
 await fetch(API+'/registro',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({
    user:ruser.value,
    pass:rpass.value,
    nombre:rnombre.value
  })
 });

 alert('Registrado correctamente');
 show('login');
}

// COMPRA
function pagar(plan,precio){
 alert("Simulación de compra: "+plan+" S/"+precio);
}

// LOGOUT
function logout(){
 location.reload();
}
</script>

</body>
</html>
